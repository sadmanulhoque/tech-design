<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Your Store</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #0d6efd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: #f8f9fa;
            color: #333;
        }

        #wsus__cart_view {
            padding-top: 65px;
            padding-bottom: 50px;
        }

        .wsus__cart_list {
            background: #fff;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: rgb(50 50 93 / 15%) 0px 0px 5px 0px;
        }

        .wsus__cart_list table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .wsus__cart_list table thead tr {
            background: #def0ff;
        }

        .wsus__cart_list table tbody tr {
            border-top: 1px solid #eee;
        }

        .wsus__cart_list table tbody tr td,
        .wsus__cart_list table thead tr th {
            padding: 14px 8px;
            vertical-align: middle;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Column widths */
        .wsus__pro_img { width: 135px; min-width: 135px; }
        .wsus__pro_name { width: 310px; min-width: 310px; text-align: left !important; }
        .wsus__pro_status { width: 135px; min-width: 135px; }
        .wsus__pro_select { width: 175px; min-width: 175px; }
        .wsus__pro_icon { width: 115px; min-width: 115px; text-align: center; }

        .wsus__cart_list table thead tr th {
            color: #333;
            font-weight: 500;
            font-size: 15px;
            text-transform: capitalize;
            white-space: nowrap;
        }

        .wsus__cart_list .wsus__pro_img img {
            width: 100%;
            height: 125px;
            object-fit: cover;
            border-radius: 6px;
        }

        /* Product Name - Force Single Line */
        .wsus__pro_name p {
            margin: 0 0 5px 0;
            font-weight: 500;
            color: #0d6efd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .wsus__pro_name a {
            color: #0d6efd;
            text-decoration: none;
        }

        .wsus__pro_name span {
            font-size: 14px;
            color: #555;
        }

        .wsus__pro_status p {
            font-size: 15px;
            font-weight: 500;
            color: #0d6efd;
            margin: 0;
            white-space: nowrap;
        }

        .qty-input {
            width: 52px;
            height: 38px;
            border: 1px solid #ddd;
            font-size: 16px;
            text-align: center;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            border: none;
        }

        .wsus__pro_icon a {
            color: #333;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .wsus__pro_icon a:hover {
            color: #ed1b35;
        }

        /* Clear Cart Button */
        .clear-cart-btn {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 9px 22px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 15px;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(13, 110, 253, 0.3);
        }

        .clear-cart-btn:hover {
            background: #0b5ed7;
        }

        /* Cart Summary */
        .wsus__cart_list_footer_button {
            background: #fff;
            border-radius: 5px;
            padding: 20px;
            box-shadow: rgb(50 50 93 / 15%) 0px 0px 5px 0px;
        }

        .wsus__cart_list_footer_button h6 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .wsus__cart_list_footer_button p {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            margin: 8px 0;
        }

        .wsus__cart_list_footer_button .total {
            border-top: 2px solid #def0ff;
            padding-top: 12px;
            font-size: 18px;
            font-weight: 700;
        }

        .common_btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-weight: 500;
            margin-top: 10px;
            text-decoration: none;
            color: white;
        }

        .common_btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<section id="wsus__cart_view">
    <div class="container">
        <div class="row">
            <!-- Cart Items -->
            <div class="col-xl-9">
                <div class="wsus__cart_list">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr class="d-flex">
                                    <th class="wsus__pro_img">Product Image</th>
                                    <th class="wsus__pro_name">Product Name</th>
                                    <th class="wsus__pro_status">Price</th>
                                    <th class="wsus__pro_status">Total Price</th>
                                    <th class="wsus__pro_select">Quantity</th>
                                    <th class="wsus__pro_icon">
                                        <button onclick="alert('Cart Cleared!')" class="clear-cart-btn">Clear Cart</button>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Item 1 -->
                                <tr class="d-flex">
                                    <td class="wsus__pro_img">
                                        <img src="https://picsum.photos/id/1015/300/300" alt="product">
                                    </td>
                                    <td class="wsus__pro_name">
                                        <p><a href="#">Premium Cotton Frock (B-0E48)</a></p>
                                        <span>Size: 16 (+৳ 0)</span>
                                    </td>
                                    <td class="wsus__pro_status">
                                        <p>৳ 300</p>
                                    </td>
                                    <td class="wsus__pro_status">
                                        <p>৳ 300</p>
                                    </td>
                                    <td class="wsus__pro_select">
                                        <div class="d-flex align-items-center justify-content-center gap-1">
                                            <button class="btn btn-danger qty-btn">-</button>
                                            <input type="number" value="1" class="qty-input form-control" readonly>
                                            <button class="btn btn-success qty-btn">+</button>
                                        </div>
                                    </td>
                                    <td class="wsus__pro_icon">
                                        <a href="#"><i class="fas fa-times"></i></a>
                                    </td>
                                </tr>

                                <!-- Item 2 -->
                                <tr class="d-flex">
                                    <td class="wsus__pro_img">
                                        <img src="https://picsum.photos/id/201/300/300" alt="product">
                                    </td>
                                    <td class="wsus__pro_name">
                                        <p><a href="#">Premium Cotton Frock (B-0B56) Long Product Name Example Here</a></p>
                                        <span>Size: 16 (+৳ 0)</span>
                                    </td>
                                    <td class="wsus__pro_status">
                                        <p>৳ 300</p>
                                    </td>
                                    <td class="wsus__pro_status">
                                        <p>৳ 300</p>
                                    </td>
                                    <td class="wsus__pro_select">
                                        <div class="d-flex align-items-center justify-content-center gap-1">
                                            <button class="btn btn-danger qty-btn">-</button>
                                            <input type="number" value="1" class="qty-input form-control" readonly>
                                            <button class="btn btn-success qty-btn">+</button>
                                        </div>
                                    </td>
                                    <td class="wsus__pro_icon">
                                        <a href="#"><i class="fas fa-times"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="col-xl-3">
                <div class="wsus__cart_list_footer_button" id="sticky_sidebar">
                    <h6>Total Cart</h6>
                    <p>Total: <span class="sub_total">৳ 600</span></p>

                    <a href="#" class="common_btn" style="background:#0d6efd;">Checkout</a>
                    <a href="#" class="common_btn" style="background:#0d6efd;">
                        <i class="fas fa-shopping-bag"></i> Go Shop
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
