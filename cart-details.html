<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - TechGadget</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #F27F20;
            --primary-hover: #E36313;
            --dark: #292929;
            --border: #E5E5E5;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #FAFAFA;
            color: #292929;
        }

        #wsus__cart_view {
            padding-top: 40px;
            padding-bottom: 60px;
        }

        /* Breadcrumb */
        .cart-breadcrumb {
            font-size: 14px;
            color: #525252;
            margin-bottom: 24px;
        }

        .cart-breadcrumb a {
            color: #525252;
            text-decoration: none;
        }

        .cart-breadcrumb a:hover {
            color: var(--primary);
        }

        .cart-breadcrumb span {
            color: var(--dark);
        }

        .wsus__cart_list {
            background: #fff;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 12px 16px -4px rgba(0,0,0,0.08);
        }

        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .wsus__cart_list table {
            width: 100%;
            border-collapse: collapse;
            min-width: 920px;
        }

        .wsus__cart_list table thead tr {
            background: #F8F9FA;
        }

        .wsus__cart_list table tbody tr {
            border-top: 1px solid var(--border);
        }

        .wsus__cart_list table tbody tr td,
        .wsus__cart_list table thead tr th {
            padding: 16px 12px;
            vertical-align: middle;
            border-right: 1px solid var(--border);
            white-space: nowrap;
        }

        .wsus__cart_list table tbody tr td:last-child,
        .wsus__cart_list table thead tr th:last-child {
            border-right: none;
        }

        /* Column widths */
        .wsus__pro_img { width: 130px; min-width: 130px; }
        .wsus__pro_name { width: 320px; min-width: 320px; text-align: left !important; }
        .wsus__pro_status { width: 140px; min-width: 140px; }
        .wsus__pro_select { width: 170px; min-width: 170px; }
        .wsus__pro_icon { width: 100px; min-width: 100px; text-align: center; }

        .wsus__cart_list table thead tr th {
            color: #292929;
            font-weight: 600;
            font-size: 15px;
        }

        .wsus__cart_list .wsus__pro_img img {
            width: 100%;
            height: 125px;
            object-fit: cover;
            border-radius: 10px;
        }

        .wsus__pro_name p {
            margin: 0 0 6px 0;
            font-weight: 600;
            color: var(--dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .wsus__pro_name a {
            color: var(--dark);
        }

        .wsus__pro_name a:hover {
            color: var(--primary);
        }

        .wsus__pro_name span {
            font-size: 14px;
            color: #525252;
        }

        .wsus__pro_status p {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .qty-input {
            width: 52px;
            height: 40px;
            border: 1px solid var(--border);
            font-size: 16px;
            text-align: center;
            border-radius: 8px;
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
        }

        .wsus__pro_icon a {
            color: #525252;
            font-size: 22px;
        }

        .clear-cart-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
        }

        .clear-cart-btn:hover {
            background: var(--primary-hover);
        }

        /* Cart Summary */
        .wsus__cart_list_footer_button {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 12px 16px -4px rgba(0,0,0,0.08);
        }

        .wsus__cart_list_footer_button h6 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .wsus__cart_list_footer_button p {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            margin: 10px 0;
        }

        .wsus__cart_list_footer_button .total {
            border-top: 2px solid var(--border);
            padding-top: 16px;
            font-size: 19px;
            font-weight: 700;
        }

        .common_btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 9999px;
            text-align: center;
            font-weight: 600;
            margin-top: 12px;
            text-decoration: none;
            font-size: 15px;
        }
    </style>
</head>
<body>

<section id="wsus__cart_view">
    <div class="container">
        
        <!-- Breadcrumb -->
        <div class="cart-breadcrumb">
            <a href="/">Home</a> &gt; 
            <a href="/cart">Cart</a>
        </div>

        <div class="row">
            <!-- Cart Items -->
            <div class="col-xl-9">
                <div class="wsus__cart_list">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr class="d-flex">
                                    <th class="wsus__pro_img">Product Image</th>
                                    <th class="wsus__pro_name">Product Name</th>
                                    <th class="wsus__pro_status">Price</th>
                                    <th class="wsus__pro_status">Total Price</th>
                                    <th class="wsus__pro_select">Quantity</th>
                                    <th class="wsus__pro_icon">
                                        <button class="clear-cart-btn">Clear Cart</button>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Item 1 -->
                                <tr class="d-flex">
                                    <td class="wsus__pro_img">
                                        <img src="https://picsum.photos/id/1015/300/300" alt="product">
                                    </td>
                                    <td class="wsus__pro_name">
                                        <p><a href="#">Premium Cotton Frock (B-0E48)</a></p>
                                        <span>Size: 16 (+৳ 0)</span>
                                    </td>
                                    <td class="wsus__pro_status">
                                        <p>৳ 300</p>
                                    </td>
                                    <td class="wsus__pro_status">
                                        <p>৳ 300</p>
                                    </td>
                                    <td class="wsus__pro_select">
                                        <div class="d-flex align-items-center justify-content-center gap-2">
                                            <button class="btn btn-outline-danger qty-btn">-</button>
                                            <input type="number" value="1" class="qty-input" readonly>
                                            <button class="btn btn-outline-success qty-btn">+</button>
                                        </div>
                                    </td>
                                    <td class="wsus__pro_icon">
                                        <a href="#"><i class="fas fa-times"></i></a>
                                    </td>
                                </tr>

                                <!-- Item 2 -->
                                <tr class="d-flex">
                                    <td class="wsus__pro_img">
                                        <img src="https://picsum.photos/id/201/300/300" alt="product">
                                    </td>
                                    <td class="wsus__pro_name">
                                        <p><a href="#">Premium Cotton Frock (B-0B56) Long Product Name Example</a></p>
                                        <span>Size: 16 (+৳ 0)</span>
                                    </td>
                                    <td class="wsus__pro_status">
                                        <p>৳ 300</p>
                                    </td>
                                    <td class="wsus__pro_status">
                                        <p>৳ 300</p>
                                    </td>
                                    <td class="wsus__pro_select">
                                        <div class="d-flex align-items-center justify-content-center gap-2">
                                            <button class="btn btn-outline-danger qty-btn">-</button>
                                            <input type="number" value="1" class="qty-input" readonly>
                                            <button class="btn btn-outline-success qty-btn">+</button>
                                        </div>
                                    </td>
                                    <td class="wsus__pro_icon">
                                        <a href="#"><i class="fas fa-times"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="col-xl-3">
                <div class="wsus__cart_list_footer_button" id="sticky_sidebar">
                    <h6>Total Cart</h6>
                    <p>Total: <span class="sub_total">৳ 600</span></p>

                    <a href="#" class="common_btn" style="background:var(--primary); color:white;">Checkout</a>
                    <a href="#" class="common_btn" style="background:#292929; color:white;">
                        <i class="fas fa-shopping-bag"></i> Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
